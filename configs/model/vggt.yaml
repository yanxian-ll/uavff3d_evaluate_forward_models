# String for model factory
model_str: "vggt"
# Model config
model_config:
  name: "vggt"
  # Load pre-trained weights
  load_pretrained_weights: true
  # Load custom checkpoint
  load_custom_ckpt: false
  # Custom checkpoint path
  custom_ckpt_path: null
  # VGGT model name or path  facebook/VGGT-1B
  pretrained_model_name_or_path: "checkpoints/vggt"
  # activation checkpointing for memory efficiency during training/inference
  gradient_checkpointing: true
# Image Normalization Type
data_norm_type: "identity"
# VGGT checkpoint is already loaded in the inference wrapper
pretrained: null
# Torch hub force reload
torch_hub_force_reload: false
