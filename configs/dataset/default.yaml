defaults:
  - resolution_options: default
  - blendedmvs_wai: default
  - uavscenes_wai: default
  - whu_whuomvs_wai: default
  - uavff3d_real_wai: default
  - uavff3d_syn_large_wai: default
  - uavff3d_syn_small_wai: default
  - uavff3d_fa_wai: default
  - usegeo_wai: default
  - urbanscene3d_wai: default
  - enrich_wai: default

# Dataset strings are composed by the selected experiment config.
train_dataset: ???
test_dataset: "[null]"
num_workers: 12
resolution_train: ???
resolution_val: ???
num_views: 2
principal_point_centered: false

train:
  # Enables variable-length multi-view groups during N-view fine-tuning.
  variable_num_views: true
  use_hfov_balanced_sampling: false

val:
  variable_num_views: false

test:
  variable_num_views: false
