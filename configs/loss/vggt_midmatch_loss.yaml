train_criterion: >-
  VGGTMidMatchCriterion(
    base_criterion=ConfAndExcludeTopNPercentPixelLoss(
      FactoredGeometryRegr3DPlusNormalGMLoss(
        RobustRegressionLoss(alpha=0.5, scaling_c=0.05),
        norm_mode='avg_dis',
        depth_type_for_loss='depth_z',
        loss_in_log=True,
        flatten_across_image_only=True,
        compute_pairwise_relative_pose_loss=False,
        compute_world_frame_points_loss=True,
        apply_normal_and_gm_loss_to_synthetic_data_only=True,
        normal_loss_weight=3.0,
        gm_loss_weight=3.0
      ),
      conf_alpha=0.2,
      top_n_percent=5,
      apply_to_real_data_only=True,
      conf_loss_set_indices=[0],
      exclude_loss_set_indices=[1, 2]
    ),
    match_weight=0.20,
    fine_weight=0.00,
    conf_weight=0.02,
    temperature=0.07,
    num_samples_per_pair=512,
    pair_mode='view0_to_others',
    occlusion_abs_thresh=0.05,
    occlusion_rel_thresh=0.05,
    fine_window_radius=2
  )

test_criterion: >-
  VGGTMidMatchCriterion(
    base_criterion=ExcludeTopNPercentPixelLoss(
      FactoredGeometryRegr3DPlusNormalGMLoss(
        RobustRegressionLoss(alpha=0.5, scaling_c=0.05),
        norm_mode='avg_dis',
        depth_type_for_loss='depth_z',
        loss_in_log=True,
        flatten_across_image_only=True,
        compute_pairwise_relative_pose_loss=False,
        compute_world_frame_points_loss=True,
        apply_normal_and_gm_loss_to_synthetic_data_only=True,
        normal_loss_weight=3.0,
        gm_loss_weight=3.0
      ),
      top_n_percent=5,
      apply_to_real_data_only=True,
      loss_set_indices=[0, 1, 2]
    ),
    match_weight=0.20,
    fine_weight=0.00,
    conf_weight=0.02,
    temperature=0.07,
    num_samples_per_pair=512,
    pair_mode='view0_to_others',
    occlusion_abs_thresh=0.05,
    occlusion_rel_thresh=0.05,
    fine_window_radius=2
  )
